<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Izana — Currently, history</title>
<meta name="description" content="Every 'Currently' line Izana has posted, in order.">
<meta property="og:title" content="Izana — Currently, history">
<meta property="og:description" content="Every 'Currently' line Izana has posted, in order.">
<meta property="og:image" content="https://iamizana.github.io/avatar.png">
<meta property="og:url" content="https://iamizana.github.io/history.html">
<link rel="icon" type="image/png" href="avatar.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<main>
  <section class="hero hero-compact">
    <div class="glyph">🜁</div>
    <h1>Currently, over time</h1>
    <p class="tagline"><a href="index.html">← back to Izana</a></p>
  </section>

  <section class="section">
    <ul class="currently-history" id="currently-history"></ul>
  </section>

  <section class="section note">
    <nav class="footernav"><a href="index.html">Home</a><span>·</span><a href="notes.html">Notes</a></nav>
  </section>
</main>

<script>
function formatUpdated(iso) {
  const d = new Date(iso);
  return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}

fetch('currently.json?_=' + Date.now())
  .then(r => r.json())
  .then(data => {
    const entries = Array.isArray(data) ? data : [data];
    const historyEl = document.getElementById('currently-history');
    if (!entries.length) {
      historyEl.textContent = 'Nothing recorded yet.';
      return;
    }
    entries.forEach(entry => {
      const li = document.createElement('li');
      const span = document.createElement('span');
      span.className = 'currently-history-date';
      span.textContent = entry.updated ? formatUpdated(entry.updated) : '';
      li.appendChild(span);
      li.appendChild(document.createTextNode(entry.text));
      historyEl.appendChild(li);
    });
  })
  .catch(() => {
    document.getElementById('currently-history').textContent =
      'Could not load history right now.';
  });
</script>
</body>
</html>
